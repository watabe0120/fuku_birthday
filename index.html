<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ふくちゃん誕生日</title>

<style>
body {
  background:#121212;
  color:#fff;
  font-family:Arial,sans-serif;
  margin:0;
  padding:0;
}

/* タイトルページ */
#titlePage {
  text-align:center;
  margin-top:120px;
  padding:20px;
}

#titlePage button {
  padding:14px 28px;
  font-size:18px;
  border:none;
  border-radius:8px;
  background:#4CAF50;
  color:white;
  cursor:pointer;
}

#titlePage button:hover {
  background:#45a049;
}

/* クイズページ */
#quizPage {
  display:none;
  margin-top:50px;
  padding:20px;
}

.quiz-container {
  width:90%;
  max-width:500px;
  margin:auto;
  background:#1e1e1e;
  padding:25px;
  border-radius:12px;
  text-align:center;
  box-shadow:0 0 15px rgba(0,0,0,0.5);
}

.choice {
  display:block;
  width:100%;
  padding:14px;
  margin:10px 0;
  background:#2c2c2c;
  border:none;
  border-radius:8px;
  color:white;
  font-size:16px;
  cursor:pointer;
}

.choice:hover {
  background:#3a3a3a;
}

#nextBtn {
  margin-top:15px;
  padding:10px 22px;
  display:none;
  border:none;
  border-radius:8px;
  background:#4CAF50;
  color:white;
  cursor:pointer;
}

/* 動画（全ページ共通） */
iframe {
  margin-top:15px;
  width:100%;
  aspect-ratio:16/9;
  border-radius:8px;
}

/* エンディングページ */
#endVideoPage {
  display:none;
  margin-top:50px;
  padding:20px;
  text-align:center;
}

/* スマホ微調整 */
@media (max-width:480px){
  #titlePage {
    margin-top:80px;
  }

  h1 {
    font-size:22px;
  }

  .quiz-container {
    padding:20px;
  }
}
</style>
</head>
<body>

<!-- タイトル -->
<div id="titlePage">
  <h1>🎉 ふくちゃん 🎉</h1>
  <h1>🎉 誕生日おめでとう 🎉</h1>
  <p>楽しみながら挑戦してみてね！</p>
  <button onclick="startQuiz()">スタート！</button>
</div>

<!-- クイズページ -->
<div id="quizPage">
  <div class="quiz-container">
    <h2>ふくちゃんクイズ</h2>
    <p id="question"></p>
    <div id="choices"></div>
    <p id="result"></p>

    <div id="youtubeWrapper" style="display:none;">
      <iframe id="videoFrame"
        frameborder="0"
        allow="autoplay; encrypted-media"
        allowfullscreen>
      </iframe>
    </div>

    <button id="nextBtn" onclick="nextQuestion()">次へ</button>
  </div>
</div>

<!-- エンディング -->
<div id="endVideoPage">
  <div class="quiz-container">
    <h1>🎉 改めて誕生日おめでとう！🎉</h1>
    <p>最後にスペシャル動画をどうぞ！</p>

    <iframe id="finalVideo"
      frameborder="0"
      allow="autoplay; encrypted-media"
      allowfullscreen>
    </iframe>
  </div>
</div>

<script>

// youtu.be → embed変換
function convertToEmbed(url){
  if(url.includes("youtu.be/")){
    const id = url.split("youtu.be/")[1].split("?")[0];
    return "https://www.youtube.com/embed/" + id;
  }
  return url;
}

const quizData = [

  {
    question:"みんなが思うふくちゃんのすきなところは？",
    choices:["真っ向勝負でずるくないところ","音の見せ方とアンサンブル力","なんでも合わせてくれる2nd力","あきら","情に厚くひと思いなところ"],
    youtubePerChoice:[
      "https://youtu.be/fpxalgJ0Svo",
      "https://youtu.be/H5i2giLYp5M",
      "https://youtu.be/9J7NDj3x4mc",
      "https://youtu.be/QLY_0-Tsw14",
      "https://youtu.be/aXlZ9Gun2gI"
    ]
  },

  {
    question:"ふくちゃんの尊敬するところは？",
    choices:["すべてにおいて全力で取り組んでずるをしないところ","誰も嫌な気持ちにならないところ","有言実行なところ","あきら","語彙力が半端なくてたとえるのが上手なところ"],
    youtubePerChoice:[
      "https://youtu.be/JAkhFqdXWaU",
      "https://youtu.be/pjDBJkqLqnI",
      "https://youtu.be/IRUVDFOVJ9w",
      "https://youtu.be/QLY_0-Tsw14",
      "https://youtu.be/NvlI8-LPjk4"
    ]
  },

  {
    question:"それぞれのメッセージ",
    choices:["かほ","なべ","かんた","あきら","ちはる","〇〇＆〇〇"],
    youtubePerChoice:[
      "https://youtu.be/OoegHu6Wm6Y",
      "https://youtu.be/co-3cVDF8zg",
      "https://youtu.be/gd09NqOwUSc",
      "https://youtu.be/QLY_0-Tsw14",
      "https://youtu.be/xR7CKmwyVzg",
      "https://youtu.be/q_uTN6iLcOY"
    ]
  }

];

let currentQuestion = 0;

function startQuiz(){
  document.getElementById("titlePage").style.display="none";
  document.getElementById("quizPage").style.display="block";
  loadQuestion();
}

function loadQuestion(){
  const q = quizData[currentQuestion];
  document.getElementById("question").textContent=q.question;
  document.getElementById("result").textContent="";
  document.getElementById("youtubeWrapper").style.display="none";
  document.getElementById("videoFrame").src="";
  document.getElementById("nextBtn").style.display="none";

  const choicesEl = document.getElementById("choices");
  choicesEl.innerHTML="";

  for(let i=0;i<q.choices.length;i++){
    const btn = document.createElement("button");
    btn.textContent=q.choices[i];
    btn.className="choice";
    btn.onclick=()=>checkAnswer(i);
    choicesEl.appendChild(btn);
  }
}

function checkAnswer(selected){
  const q = quizData[currentQuestion];

  document.getElementById("result").textContent="素敵な選択！🎉";
  document.getElementById("youtubeWrapper").style.display="block";

  const embedURL = convertToEmbed(q.youtubePerChoice[selected]);

  document.getElementById("videoFrame").src =
    embedURL + "?autoplay=1&mute=0";

  document.getElementById("nextBtn").style.display="inline-block";
}

function nextQuestion(){
  currentQuestion++;

  if(currentQuestion < quizData.length){
    loadQuestion();
  } else {
    document.getElementById("quizPage").style.display="none";
    document.getElementById("endVideoPage").style.display="block";

    const finalURL = convertToEmbed("https://youtu.be/TlP0V-h_aOI");

    document.getElementById("finalVideo").src =
      finalURL + "?autoplay=1&mute=0";
  }
}

</script>
</body>
</html>
